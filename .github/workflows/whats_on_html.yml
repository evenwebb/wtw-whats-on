# Generate and publish WTW cinemas what's-on HTML when listings change.
# Runs daily and on manual trigger; commits only when data or cache changed.
#
# Minute savers: job-level env (one place), combined pip+scraper step, faster TMDb pacing in CI
# (TMDB_DELAY_SEC / TMDB_MAX_SEARCH_QUERY_VARIANTS). Override via repo Variables if needed.
name: What's On HTML

on:
  schedule:
    - cron: "0 9 * * *"   # 09:00 UTC daily
  workflow_dispatch:

concurrency:
  group: wtw-whats-on-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      CREATE_FAILURE_ISSUE: ${{ secrets.CREATE_FAILURE_ISSUE }}
      POSTER_MISSING_FAIL_THRESHOLD: ${{ vars.POSTER_MISSING_FAIL_THRESHOLD || '8' }}
      WTW_ENABLED_CINEMAS: "st-austell,newquay,truro,wadebridge"
      HEALTHCHECK_ENFORCE: "true"
      HEALTH_MIN_TOTAL_FILMS: ${{ vars.HEALTH_MIN_TOTAL_FILMS || '8' }}
      HEALTH_MIN_TOTAL_SHOWTIMES: ${{ vars.HEALTH_MIN_TOTAL_SHOWTIMES || '20' }}
      HEALTH_MIN_CINEMAS_WITH_FILMS: ${{ vars.HEALTH_MIN_CINEMAS_WITH_FILMS || '3' }}
      HEALTH_MIN_NOW_SHOWING_FILMS: ${{ vars.HEALTH_MIN_NOW_SHOWING_FILMS || '3' }}
      HEALTH_MAX_MARKUP_SUSPECT_CINEMAS: ${{ vars.HEALTH_MAX_MARKUP_SUSPECT_CINEMAS || '1' }}
      HEALTH_EXCLUDED_CINEMAS: ${{ vars.HEALTH_EXCLUDED_CINEMAS || 'st-ives' }}
      MAX_CONSECUTIVE_CINEMA_FAILURES: ${{ vars.MAX_CONSECUTIVE_CINEMA_FAILURES || '2' }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      # Tighter pacing than local dev defaults (see whats_on_scraper.py). Tune via repo Variables.
      TMDB_DELAY_SEC: ${{ vars.TMDB_DELAY_SEC || '0.1' }}
      TMDB_MAX_SEARCH_QUERY_VARIANTS: ${{ vars.TMDB_MAX_SEARCH_QUERY_VARIANTS || '6' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies and run scraper
        run: |
          set -eu -o pipefail
          if [ -z "${TMDB_API_KEY:-}" ]; then
            echo "TMDB_API_KEY is required for reliable poster enrichment. Set repository secret TMDB_API_KEY."
            exit 1
          fi
          echo "::add-mask::${TMDB_API_KEY}"
          pip install -q -r requirements.txt
          mkdir -p logs
          cat > logs/health_env.txt <<EOF
          WTW_ENABLED_CINEMAS=${WTW_ENABLED_CINEMAS}
          HEALTHCHECK_ENFORCE=${HEALTHCHECK_ENFORCE}
          HEALTH_MIN_TOTAL_FILMS=${HEALTH_MIN_TOTAL_FILMS}
          HEALTH_MIN_TOTAL_SHOWTIMES=${HEALTH_MIN_TOTAL_SHOWTIMES}
          HEALTH_MIN_CINEMAS_WITH_FILMS=${HEALTH_MIN_CINEMAS_WITH_FILMS}
          HEALTH_MIN_NOW_SHOWING_FILMS=${HEALTH_MIN_NOW_SHOWING_FILMS}
          HEALTH_MAX_MARKUP_SUSPECT_CINEMAS=${HEALTH_MAX_MARKUP_SUSPECT_CINEMAS}
          HEALTH_EXCLUDED_CINEMAS=${HEALTH_EXCLUDED_CINEMAS}
          MAX_CONSECUTIVE_CINEMA_FAILURES=${MAX_CONSECUTIVE_CINEMA_FAILURES}
          POSTER_MISSING_FAIL_THRESHOLD=${POSTER_MISSING_FAIL_THRESHOLD}
          TMDB_DELAY_SEC=${TMDB_DELAY_SEC}
          TMDB_MAX_SEARCH_QUERY_VARIANTS=${TMDB_MAX_SEARCH_QUERY_VARIANTS}
          EOF
          python3 whats_on_scraper.py 2>&1 | tee logs/scraper.log

      - name: Upload scraper log artifact on failure
        if: failure() && hashFiles('logs/scraper.log') != ''
        uses: actions/upload-artifact@v7
        with:
          name: scraper-logs-${{ github.run_id }}
          path: logs/
          if-no-files-found: ignore

      - name: Commit and push if output changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for f in whats_on_data.json .tmdb_cache.json .whats_on_fingerprint .cinema_failure_state.json; do
            if [ -f "$f" ]; then
              git add "$f"
            fi
          done
          if [ -d docs ]; then
            git add docs/
          fi
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update whats-on data and HTML"
          git push

      - name: Create or update failure issue
        if: failure() && env.CREATE_FAILURE_ISSUE == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labels = ["automation", "scraper-failure"];
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const artifactsUrl = `${runUrl}#artifacts`;
            const fs = require("fs");
            const crypto = require("crypto");

            let scraperLog = "";
            try {
              scraperLog = fs.readFileSync("logs/scraper.log", "utf8");
            } catch (e) {}
            let healthEnv = "";
            try {
              healthEnv = fs.readFileSync("logs/health_env.txt", "utf8");
            } catch (e) {}

            const logLines = scraperLog.split(/\r?\n/).filter(Boolean);
            const interestingLines = logLines.filter((line) =>
              /error|exception|traceback|runtimeerror|failed|health check|selector/i.test(line)
            );
            const logExcerpt = (interestingLines.length ? interestingLines : logLines).slice(-60).join("\n");

            const jobsResp = await github.rest.actions.listJobsForWorkflowRun({
              owner,
              repo,
              run_id: context.runId,
              per_page: 100,
            });
            const allJobs = jobsResp.data.jobs || [];
            const thisJob = allJobs.find((j) => j.name === context.job) || allJobs[0];
            const failedSteps = ((thisJob && thisJob.steps) || [])
              .filter((s) => s.conclusion === "failure")
              .map((s) => s.name);

            const signatureInput = [
              context.workflow,
              context.job,
              (failedSteps || []).join("|"),
              logExcerpt.replace(/\b\d{4}-\d{2}-\d{2}\b/g, "<date>").replace(/\b[0-9a-f]{7,40}\b/gi, "<sha>"),
            ].join("\n");
            const errorSignature = crypto.createHash("sha256").update(signatureInput).digest("hex").slice(0, 12);

            const title = "What's On workflow failures";
            const marker = `<!-- failure-signature:${errorSignature} -->`;
            const streakRegex = /<!-- success-streak:(\d+) -->/;
            const resetStreak = (body) => {
              const text = body || "";
              if (streakRegex.test(text)) {
                return text.replace(streakRegex, "<!-- success-streak:0 -->");
              }
              return text + "\n\n<!-- success-streak:0 -->";
            };

            const body = [
              "The scheduled/manual What's On workflow failed.",
              "",
              `- Workflow: ${context.workflow}`,
              `- Job: ${context.job}`,
              `- Event: ${context.eventName}`,
              `- Actor: ${context.actor}`,
              `- Ref: ${context.ref}`,
              `- Run: ${runUrl}`,
              `- Artifacts: ${artifactsUrl}`,
              `- Commit: ${context.sha}`,
              `- Error signature: ${errorSignature}`,
              failedSteps.length ? `- Failed step(s): ${failedSteps.join(", ")}` : "- Failed step(s): unknown",
              "",
              "### Config snapshot",
              "```text",
              healthEnv || "No logs/health_env.txt captured.",
              "```",
              "",
              "### Error excerpt",
              "```text",
              (logExcerpt || "No logs/scraper.log captured."),
              "```",
              "",
              "### Next checks",
              "1. Open the run logs and inspect the first failing step.",
              "2. If selectors changed, update parsing rules in `whats_on_scraper.py`.",
              "3. If health thresholds are too strict, tune repo vars.",
              "",
              marker,
              "<!-- success-streak:0 -->",
            ].join("\n");

            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "all",
              labels: labels.join(","),
              per_page: 100
            });

            let issue = existing.data.find((item) => item.title === title);
            if (!issue) {
              issue = existing.data.find((item) => (item.body || "").includes(marker));
            }
            if (issue) {
              const issueBodyReset = resetStreak(issue.body || "");
              if (issueBodyReset !== (issue.body || "")) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: issueBodyReset
                });
              }
              if (issue.state === "closed") {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issue.number,
                  state: "open"
                });
              }
              const comments = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number: issue.number,
                per_page: 100
              });
              const alreadyTracked = (issue.body || "").includes(marker)
                || comments.data.some((c) => (c.body || "").includes(marker));
              if (!alreadyTracked) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: [
                    `Failure detected on ${new Date().toISOString()}.`,
                    "",
                    `Run: ${runUrl}`,
                    `Artifacts: ${artifactsUrl}`,
                    `Commit: ${context.sha}`,
                    `Error signature: ${errorSignature}`,
                    failedSteps.length ? `Failed step(s): ${failedSteps.join(", ")}` : "Failed step(s): unknown",
                    "",
                    "```text",
                    (logExcerpt || "No logs/scraper.log captured."),
                    "```",
                    "",
                    marker
                  ].join("\n")
                });
              }
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels
              });
            }

      - name: Auto-close stale failure issues after 2 successful runs
        if: success() && env.CREATE_FAILURE_ISSUE == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labels = ["automation", "scraper-failure"];
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const streakRegex = /<!-- success-streak:(\d+) -->/;

            const upsertStreak = (body, next) => {
              const text = body || "";
              if (streakRegex.test(text)) {
                return text.replace(streakRegex, `<!-- success-streak:${next} -->`);
              }
              return text + `\n\n<!-- success-streak:${next} -->`;
            };

            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: labels.join(","),
              per_page: 100
            });

            for (const issue of existing.data) {
              const body = issue.body || "";
              const m = body.match(streakRegex);
              const curr = m ? parseInt(m[1], 10) || 0 : 0;
              const next = curr + 1;
              const nextBody = upsertStreak(body, next);

              if (next >= 2) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: [
                    "Auto-closing after 2 consecutive successful workflow runs.",
                    "",
                    `Latest successful run: ${runUrl}`
                  ].join("\n")
                });
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issue.number,
                  state: "closed",
                  body: nextBody
                });
              } else {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: nextBody
                });
              }
            }
